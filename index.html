<!doctype html>
<html lang="ko">
  <head>
    <script>
      (function () {
        var host = location.hostname;
        var path = location.pathname || '/';
        // HTTP → HTTPS 자동 전환 (주의 요함 해결)
        if (location.protocol === 'http:' && host.endsWith('newsense.co.kr')) {
          location.replace('https://' + host + path + location.search + location.hash);
          return;
        }
        // ?_= 캐시우회 파라미터는 로드 후 주소창에서 제거
        if (location.search) {
          history.replaceState(null, '', path + location.hash);
        }
      })();
      // React 번들과 무관하게 동작 — 캐시된 JS여도 강제 새로고침 가능
      window.__NSC_HARD_REFRESH = function () {
        var path = location.pathname || '/';
        location.replace(location.origin + path + '?_=' + Date.now());
      };
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="canonical" href="https://work.newsense.co.kr/" />
    <title>뉴센스의원</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
